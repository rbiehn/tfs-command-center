<!doctype html>
<!--
============================================================
  TFS COMMAND CENTER | TODAY (outreach work surface)
  rbiehn.github.io/tfs-command-center/today.html
  Version 2.0 | July 15, 2026
  One place to do today's outreach: staged sends, shares due, and
  follow-ups due, pulled live from tracker_outreach / tracker_bookfunnel
  / tracker_storyorigin via the password-gated `today` edge function
  (get_today_outreach RPC). Each item shows paste-ready copy + the link
  to open, so no calendar or ClickUp needed. Shared command-center login
  (TRACKER_PASSWORD / localStorage tfs_tracker_pass). Zero LLM calls.
============================================================
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TFS - Today</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#131826; --panel2:#0f1420; --line:#232a3a;
    --ink:#e8ecf5; --muted:#93a0b8; --faint:#5f6b82;
    --gold:#e8b955; --red:#ff5c6c; --amber:#f0a83a;
    --purple:#a988ff; --green:#39d98a; --blue:#4a90d9;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:var(--purple);text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:16px 14px 64px}

  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .top h1{font-size:20px;letter-spacing:.5px;margin:0;font-weight:700}
  .top .home{font-size:13px;color:var(--muted)}
  .stamp{font-size:12px;color:var(--faint);margin:0 0 16px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-size:14px;font-weight:600;padding:9px 14px;border-radius:12px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;text-decoration:none}
  .btn:active{transform:translateY(1px)}
  .btn.open{border-color:#a988ff55;color:#cbb7ff}
  .btn.done{border-color:#39d98a55;color:#8fe6bb}
  .btn.done.confirm{background:rgba(255,92,108,.15);border-color:#ff5c6c66;color:#ff9aa5}
  .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:none;
    align-items:center;gap:6px;background:#171c28;border:1px solid var(--line);border-radius:12px;
    padding:10px 14px;font-size:13px;color:var(--ink);box-shadow:0 6px 24px rgba(0,0,0,.4);z-index:60}
  .toast a{color:var(--purple);font-weight:700;cursor:pointer}

  .section{margin:0 0 22px}
  .section > h2{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .section > h2 .count{color:var(--faint);font-weight:600}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:12px}
  .chead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .ctitle{font-size:16px;font-weight:650;line-height:1.3}
  .badge{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .badge.storyorigin{color:var(--purple);border-color:#a988ff55;background:rgba(169,136,255,.12)}
  .badge.bookfunnel{color:var(--green);border-color:#39d98a55;background:rgba(57,217,138,.12)}
  .badge.outreach{color:var(--blue);border-color:#4a90d955;background:rgba(74,144,217,.12)}
  .cmeta{font-size:12px;color:var(--muted);margin-top:5px}
  .cmeta .over{color:var(--red);font-weight:700}
  .cmeta .today{color:var(--amber);font-weight:700}

  .copywrap{position:relative;margin-top:11px}
  .copy{margin:0;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12.5px;line-height:1.5;color:#d5dcec;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;max-height:150px;overflow:hidden}
  .copy.open{max-height:none}
  .copyrow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .copybtn,.morebtn{font-size:12px;font-weight:600;padding:7px 12px;border-radius:10px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel2);color:var(--ink)}
  .copybtn.done{color:var(--green);border-color:#39d98a55}

  .actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .empty{color:var(--faint);font-size:14px;padding:10px 2px;line-height:1.5}

  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}
  .gate .box{width:100%;max-width:340px;text-align:center}
  .gate h2{font-size:16px;font-weight:650;margin:0 0 4px}
  .gate p{font-size:13px;color:var(--muted);margin:0 0 16px}
  .gate input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:16px;text-align:center;margin-bottom:10px}
  .gate .err{color:var(--red);font-size:12px;min-height:16px;margin-bottom:8px}

  .foot{margin-top:22px;text-align:center;font-size:12px;color:var(--faint);line-height:1.5}
  @media(min-width:640px){ .wrap{padding-top:24px} .top h1{font-size:24px} }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="box">
    <h2>TFS Command Center</h2>
    <p>Enter your command center password</p>
    <input id="pw" type="password" inputmode="text" autocomplete="off" placeholder="Password" />
    <div class="err" id="gateErr"></div>
    <button class="btn" style="width:100%;justify-content:center" onclick="tryUnlock()">Unlock</button>
  </div>
</div>

<div class="wrap" id="app" style="display:none">
  <div class="top">
    <h1>TODAY</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <a class="home" href="./index.html">Command Center</a>
      <button class="btn" onclick="load()">Reload</button>
    </div>
  </div>
  <div class="stamp" id="stamp">Loading...</div>

  <div id="sections"></div>

  <div class="foot">
    Live from your outreach trackers. Items stage in as the daily engine runs.<br/>
    Full lists live in the <a href="./master-tracker.html">Master Tracker</a> and <a href="./bookfunnel.html">BookFunnel</a>.
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---- Config ---------------------------------------------------------- */
var FUNCTION_URL = "https://gewufsselhrzbzrctruo.supabase.co/functions/v1/today";
/* The password is the shared command-center password, checked server-side by
   the `today` edge function against TRACKER_PASSWORD, held in localStorage
   (tfs_tracker_pass) so one login covers every command-center page. */
/* --------------------------------------------------------------------- */

var GROUPS = [
  {key:'send',     title:'Ready to send'},
  {key:'share',    title:'Shares due'},
  {key:'followup', title:'Follow-ups due'}
];
var SRC_LABEL = {storyorigin:'StoryOrigin', bookfunnel:'BookFunnel', outreach:'Outreach'};

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

function dateBits(d){
  if(!d) return {txt:'', cls:''};
  var t=new Date(d+'T00:00:00'); var now=new Date(); now.setHours(0,0,0,0);
  var days=Math.round((t-now)/86400000);
  if(isNaN(days)) return {txt:esc(d), cls:''};
  if(days<0)  return {txt:'overdue '+esc(d), cls:'over'};
  if(days===0)return {txt:'today', cls:'today'};
  if(days===1)return {txt:'tomorrow '+esc(d), cls:''};
  return {txt:esc(d)+' (in '+days+'d)', cls:''};
}

function verb(kind){ return {send:'Send', share:'Share', followup:'Due'}[kind] || ''; }

function cardHTML(it){
  var src = it.source||'';
  var db = dateBits(it.date);
  var meta = [];
  if(it.sub) meta.push(esc(it.sub));
  if(it.status) meta.push(esc(it.status));
  if(db.txt) meta.push('<span class="'+db.cls+'">'+verb(it.kind)+' '+db.txt+'</span>');

  var copyBlock = '';
  if(it.copy){
    copyBlock = '<div class="copywrap"><pre class="copy">'+esc(it.copy)+'</pre>'
      + '<div class="copyrow">'
      + '<button class="copybtn" onclick="doCopy(this)">Copy text</button>'
      + '<button class="morebtn" onclick="toggleMore(this)">Expand</button>'
      + '</div></div>';
  }

  var actions = [];
  if(it.url) actions.push('<a class="btn open" href="'+esc(it.url)+'" target="_blank" rel="noopener">Open '+esc(SRC_LABEL[src]||'link')+'</a>');
  if(it.contact && /@/.test(it.contact)) actions.push('<a class="btn" href="mailto:'+esc(it.contact)+'">Email</a>');
  actions.push('<button class="btn done" data-src="'+esc(src)+'" data-id="'+esc(it.id)+'" onclick="markDone(this)">Done</button>');
  var actionBlock = '<div class="actions">'+actions.join('')+'</div>';

  return '<div class="card">'
    + '<div class="chead"><div class="ctitle">'+esc(it.name||'(untitled)')+'</div>'
    + '<span class="badge '+esc(src)+'">'+esc(SRC_LABEL[src]||src)+'</span></div>'
    + (meta.length?'<div class="cmeta">'+meta.join(' &middot; ')+'</div>':'')
    + copyBlock + actionBlock
    + '</div>';
}

function render(d){
  var total = (d.counts?(d.counts.send+d.counts.share+d.counts.followup):0);
  var asOf = d.as_of ? new Date(d.as_of).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
  document.getElementById('stamp').textContent =
    total + (total===1?' item':' items') + ' to act on' + (asOf?'  ·  as of '+asOf:'');

  var html = '';
  GROUPS.forEach(function(g){
    var arr = d[g.key] || [];
    if(!arr.length) return;
    html += '<div class="section"><h2>'+g.title+' <span class="count">('+arr.length+')</span></h2>'
      + arr.map(cardHTML).join('') + '</div>';
  });
  if(!html){
    html = '<div class="empty">Nothing outreach-actionable today. New sends and shares appear here as the daily engine (BookFunnel + StoryOrigin) stages them.</div>';
  }
  document.getElementById('sections').innerHTML = html;
}

function doCopy(btn){
  var pre = btn.closest('.copywrap').querySelector('.copy');
  var txt = pre.innerText;
  navigator.clipboard.writeText(txt).then(function(){
    btn.textContent='Copied'; btn.classList.add('done');
    setTimeout(function(){ btn.textContent='Copy text'; btn.classList.remove('done'); },1600);
  }).catch(function(){ btn.textContent='Copy failed'; });
}
function toggleMore(btn){
  var pre = btn.closest('.copywrap').querySelector('.copy');
  var open = pre.classList.toggle('open');
  btn.textContent = open ? 'Collapse' : 'Expand';
}

/* ---- Mark done / undo ------------------------------------------------ */
var undoTimer = null;
async function fetchOp(op, src, id){
  try{
    var r = await fetch(FUNCTION_URL, {method:'POST',headers:{'content-type':'application/json'},
      body: JSON.stringify({password:getPw(), op:op, table:src, id:id}), cache:'no-store'});
    if(!r.ok) return {ok:false};
    return await r.json();
  }catch(e){ return {ok:false}; }
}
function markDone(btn){
  if(btn.classList.contains('confirm')){
    var src=btn.getAttribute('data-src'), id=Number(btn.getAttribute('data-id'));
    btn.textContent='...'; btn.disabled=true;
    fetchOp('done', src, id).then(function(r){
      if(r && r.ok){ showUndo(src,id); load(); }
      else { btn.disabled=false; btn.classList.remove('confirm'); btn.textContent='Retry'; }
    });
    return;
  }
  btn.classList.add('confirm'); btn.textContent='Confirm done?';
  setTimeout(function(){ if(btn.classList){ btn.classList.remove('confirm'); btn.textContent='Done'; } }, 3000);
}
function showUndo(src,id){
  var t=document.getElementById('toast');
  t.innerHTML='Marked done <a id="undoBtn">Undo</a>';
  t.style.display='flex';
  document.getElementById('undoBtn').onclick=function(){
    fetchOp('undone',src,id).then(function(){ t.style.display='none'; load(); });
  };
  clearTimeout(undoTimer);
  undoTimer=setTimeout(function(){ t.style.display='none'; }, 6000);
}

/* ---- Auth + load ----------------------------------------------------- */
function getPw(){ try{ return localStorage.getItem('tfs_tracker_pass')||''; }catch(e){ return ''; } }
function setPw(v){ try{ localStorage.setItem('tfs_tracker_pass', v); }catch(e){} }
function clearPw(){ try{ localStorage.removeItem('tfs_tracker_pass'); }catch(e){} }

function showApp(){ document.getElementById('gate').style.display='none'; document.getElementById('app').style.display='block'; }
function showGate(msg){
  document.getElementById('gate').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('gateErr').textContent = msg||'';
}

async function fetchToday(pw){
  return await fetch(FUNCTION_URL, {
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({password: pw}), cache:'no-store'
  });
}

async function tryUnlock(){
  var v = document.getElementById('pw').value;
  document.getElementById('gateErr').textContent='Checking...';
  try{
    var r = await fetchToday(v);
    if(r.status===401){ document.getElementById('gateErr').textContent='Wrong password'; return; }
    if(r.status===503){ document.getElementById('gateErr').textContent='Server not configured (TRACKER_PASSWORD missing).'; return; }
    if(!r.ok){ document.getElementById('gateErr').textContent='Error ('+r.status+'). Try again.'; return; }
    setPw(v); showApp(); render(await r.json());
  }catch(e){ document.getElementById('gateErr').textContent='Network error. Try again.'; }
}

async function load(){
  var pw = getPw();
  if(!pw){ showGate(''); return; }
  document.getElementById('stamp').textContent='Loading...';
  try{
    var r = await fetchToday(pw);
    if(r.status===401){ clearPw(); showGate('Session expired, re-enter password'); return; }
    if(!r.ok){ document.getElementById('stamp').textContent='Could not load ('+r.status+'). Tap Reload.'; return; }
    render(await r.json());
  }catch(e){ document.getElementById('stamp').textContent='Network error. Tap Reload.'; }
}

document.addEventListener('keydown',function(e){
  if(e.key==='Enter' && document.getElementById('gate').style.display!=='none') tryUnlock();
});

if(getPw()){ showApp(); load(); } else { showGate(''); }
</script>
</body>
</html>
