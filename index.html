  v1.2: add StoryOrigin module tile (swaps + group promos), served
  from tracker_storyorigin via the password-gated tracker edge fn.

<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TFS - Command Center</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--line:#2c3142;--txt:#e8eaf0;--dim:#9aa0b4;--accent:#c9a94a;--blue:#4a90d9;--green:#3fb27f;--purple:#a988ff;--so:#b07de0;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.wrap{max-width:640px;margin:0 auto;padding:28px 16px 60px}
h1{font-size:22px;margin:0 0 2px;letter-spacing:.3px}
h1 span{color:var(--accent)}
.sub{color:var(--dim);font-size:13px;margin:0 0 22px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tile{display:flex;flex-direction:column;justify-content:space-between;min-height:132px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;text-decoration:none;color:var(--txt);transition:transform .08s ease,border-color .15s}
.tile:active{transform:scale(.97)}
.tile .ic{font-size:26px}
.tile .nm{font-weight:700;font-size:16px;margin-top:10px}
.tile .meta{color:var(--dim);font-size:12px;margin-top:3px;min-height:15px}
.tile.td{border-color:#a988ff55}.tile.td .ic{color:var(--purple)}
.tile.pub{border-color:#f9731655}.tile.pub .ic{color:#f97316}
.tile.mt{border-color:#4a90d955}.tile.mt .ic{color:var(--blue)}
.tile.bf{border-color:#3fb27f55}.tile.bf .ic{color:var(--green)}
.tile.so{border-color:#b07de055}.tile.so .ic{color:var(--so)}
.soon{opacity:.5;pointer-events:none}
.foot{color:var(--dim);font-size:11px;text-align:center;margin-top:26px}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body><div class="wrap">
<h1><span>TFS</span> - Command Center</h1>
<p class="sub">The First Stone / World of Exousia. Tap a module.</p>
<div class="grid">
<a class="tile td" href="./today.html">
<div class="ic"><i class="fa-solid fa-sun"></i></div>
<div><div class="nm">Today</div><div class="meta">Priorities + deadlines</div></div>
</a>
<a class="tile pub" href="https://rbiehn.github.io/tfs-publish/">
<div class="ic"><i class="fa-solid fa-paper-plane"></i></div>
<div><div class="nm">TFS Publish</div><div class="meta">Post across every platform</div></div>
</a>
<a class="tile mt" href="./master-tracker.html">
<div class="ic"><i class="fa-solid fa-table-list"></i></div>
<div><div class="nm">Master Tracker</div><div class="meta" id="mtCount">Outreach</div></div>
</a>
<a class="tile bf" href="./bookfunnel.html">
<div class="ic"><i class="fa-solid fa-book-open"></i></div>
<div><div class="nm">BookFunnel</div><div class="meta" id="bfCount">Promos</div></div>
</a>
<a class="tile so" href="./storyorigin.html">
<div class="ic"><i class="fa-solid fa-arrows-rotate"></i></div>
<div><div class="nm">StoryOrigin</div><div class="meta" id="soCount">Swaps + promos</div></div>
</a>
</div>
<div class="foot">Robert Biehn &middot; exousia.world &middot; live from Supabase</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb=supabase.createClient("https://gewufsselhrzbzrctruo.supabase.co","sb_publishable_Vo58uM-Z-4cKOrAw6pno0g_pMrMuqp6");
(async function(){
try{
var o=await sb.from("tracker_outreach").select("id",{count:"exact",head:true});
if(typeof o.count==="number")document.getElementById("mtCount").textContent=o.count+" targets";
var b=await sb.from("tracker_bookfunnel").select("id",{count:"exact",head:true}).eq("queued",false);
if(typeof b.count==="number")document.getElementById("bfCount").textContent=b.count+" active promos";
var s=await sb.from("tracker_storyorigin").select("id",{count:"exact",head:true});
if(typeof s.count==="number")document.getElementById("soCount").textContent=s.count+" swaps + promos";
}catch(e){}
})();
</script>
</body></html>
