<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TFS - Master Tracker</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222634;--line:#2c3142;--txt:#e8eaf0;--dim:#9aa0b4;--accent:#c9a94a;--blue:#4a90d9;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.4}
.wrap{max-width:640px;margin:0 auto;padding:0 12px 80px}
header{position:sticky;top:0;z-index:20;background:#0f1117ee;backdrop-filter:blur(6px);padding:10px 0 6px;border-bottom:1px solid var(--line)}
.back{color:var(--dim);font-size:13px;text-decoration:none}
h1{font-size:17px;margin:6px 0 8px}h1 span{color:var(--blue)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{padding:6px 10px;border-radius:16px;border:1px solid var(--line);background:var(--card);color:var(--dim);font-size:12px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--card2);color:var(--txt);border-color:var(--accent)}
.chip.enrch.on{border-color:var(--accent);color:var(--accent)}
input.search{width:100%;margin-top:8px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:14px}
.count{color:var(--dim);font-size:12px;margin:6px 0 8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.card.done{opacity:.55}
.card.enr{border-color:#3a3f27}
.row1{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.nm{font-weight:600;font-size:15px}.enrdot{color:var(--accent)}
.meta{color:var(--dim);font-size:12.5px;margin-top:3px;word-break:break-word}
.flag{background:#3a1d22;border:1px solid #7a3b45;color:#ffb3bd;font-size:12px;padding:6px 8px;border-radius:8px;margin-top:8px;font-weight:600;line-height:1.35}
.fit{color:var(--dim);font-size:12.5px;margin-top:8px;line-height:1.4}
.verify{color:#e0a94a;font-size:11.5px;margin-top:6px}
.pill{display:inline-block;font-size:11px;padding:3px 7px;border-radius:6px;background:var(--card2);border:1px solid var(--line);color:var(--dim);margin-top:8px}
.pill.pr{border-color:var(--accent);color:var(--accent)}
.pitch{margin-top:9px;background:#12151d;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12.5px;color:#cfd3e0;white-space:pre-wrap;display:none;line-height:1.5}
.pitch.on{display:block}
.acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.btn{flex:1;min-width:90px;text-align:center;padding:10px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
.btn.go{background:var(--accent);color:#141414;border-color:var(--accent)}
.btn.pit{background:var(--blue);color:#fff;border-color:var(--blue)}
select.st{width:100%;margin-top:9px;padding:9px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:13px}
.load{text-align:center;color:var(--dim);padding:40px}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#3fb27f;color:#08130d;padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.2s;z-index:50}
.toast.on{opacity:1}
</style></head>
<body><div class="wrap">
<header>
<a class="back" href="./">&larr; Command Center</a>
<h1><span>Master</span> Tracker</h1>
<div class="tabs" id="tabs"></div>
<input class="search" id="q" placeholder="Search all targets...">
<div class="count" id="count"></div>
</header>
<div id="list"><div class="load">Loading...</div></div>
</div>
<div class="toast" id="toast">Saved</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb=supabase.createClient("https://gewufsselhrzbzrctruo.supabase.co","sb_publishable_Vo58uM-Z-4cKOrAw6pno0g_pMrMuqp6");
var OUT=[],q="",tab="All";
var opts=["Not started","Not contacted","Contacted","Replied","Confirmed","Declined","Submitted","Live/Done"];
function esc(s){s=s==null?"":""+s;return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function toast(m){var t=document.getElementById("toast");t.textContent=m||"Saved";t.classList.add("on");setTimeout(function(){t.classList.remove("on")},1400)}
async function load(){var a=await sb.from("tracker_outreach").select("*").order("id");if(a.error){document.getElementById("list").innerHTML="<div class=load>"+esc(a.error.message)+"</div>";return}OUT=a.data||[];render()}
function channels(){var m={};OUT.forEach(function(r){m[r.channel]=(m[r.channel]||0)+1});return m}
function enrCount(){return OUT.filter(function(r){return r.enriched_at}).length}
function render(){
  var ch=channels(),keys=Object.keys(ch).sort(),h="";
  h+="<div class='chip"+(tab=="All"?" on":"")+"' onclick=\"setT('All')\">All "+OUT.length+"</div>";
  h+="<div class='chip enrch"+(tab=="Enriched"?" on":"")+"' onclick=\"setT('Enriched')\">&#10022; Ready "+enrCount()+"</div>";
  keys.forEach(function(k){h+="<div class='chip"+(tab==k?" on":"")+"' onclick=\"setT(this.dataset.k)\" data-k=\""+esc(k)+"\">"+esc(k)+" "+ch[k]+"</div>"});
  document.getElementById("tabs").innerHTML=h;
  list();
}
document.getElementById("q").addEventListener("input",function(e){q=e.target.value;list()});
function setT(k){tab=k;render()}
function match(r){if(!q)return true;return JSON.stringify(r).toLowerCase().indexOf(q.toLowerCase())>=0}
function isNote(c){return /^(HOLD|SKIP|DO NOT|BLOCKED|LOW PRIORITY|VERIFY FIRST|NOT A FIT|LONG SHOT|CHANNEL NOTE|PUBLISHER CHANNEL|BOOK IT)/i.test(c||"")}
function rowById(id){for(var i=0;i<OUT.length;i++)if(OUT[i].id==id)return OUT[i];return null}
// Smart primary contact button: Email -> mailto, URL -> open, else Copy
function contactBtn(r){
  var v=(r.contact_value||r.contact||"");
  var email=(v.match(/[\w.+\-]+@[\w\-]+\.[\w.\-]+/)||[])[0];
  var url=(v.match(/https?:\/\/[^\s|)]+/)||[])[0];
  if(email)return "<a class='btn go' href='mailto:"+esc(email)+"'>Email</a>";
  if(url)return "<a class='btn go' target=_blank href='"+esc(url)+"'>Open form</a>";
  if(v)return "<button class='btn go' onclick=\"cpv("+r.id+")\">Copy contact</button>";
  return "";
}
function list(){
  var rows=OUT.filter(function(r){return tab=="All"||(tab=="Enriched"?!!r.enriched_at:r.channel==tab)}).filter(match);
  document.getElementById("count").textContent=rows.length+" targets";
  var html="";
  rows.forEach(function(r){
    var done=/done|confirmed|submitted|live/i.test(r.status||"");
    var en=!!r.enriched_at;
    html+="<div class='card"+(done?" done":"")+(en?" enr":"")+"'>";
    html+="<div class=row1><div class=nm>"+esc(r.name)+(en?" <span class=enrdot>&#10022;</span>":"")+"</div></div>";
    html+="<div class=meta>"+esc(r.channel||"")+(r.reach?" &middot; "+esc(r.reach):"")+(r.priority?" &middot; P"+esc(r.priority):"")+"</div>";
    if(r.fit_flag)html+="<div class=flag>&#9888; "+esc(r.fit_flag)+"</div>";
    if(r.fit)html+="<div class=fit>"+esc(r.fit)+"</div>";
    if(r.pr_box&&r.pr_box.indexOf("N/A")<0&&r.pr_box.indexOf("None")<0)html+="<span class='pill pr'>PR box: "+esc(r.pr_box)+"</span>";
    if(en&&r.contact_verified===false)html+="<div class=verify>&#9888; Contact unverified - confirm before sending</div>";
    if(r.outreach_copy)html+="<div class=pitch id='p"+r.id+"'>"+esc(r.outreach_copy)+"</div>";
    html+="<div class=acts>";
    if(r.url&&r.url.indexOf("http")==0)html+="<a class='btn' target=_blank href='"+esc(r.url)+"'>Profile</a>";
    html+=contactBtn(r);
    if(r.outreach_copy){var lbl=isNote(r.outreach_copy)?"View note":"Copy pitch";html+="<button class='btn pit' onclick=\"cp("+r.id+",this)\">"+lbl+"</button>";}
    html+="</div>";
    var o=opts.slice();if(r.status&&o.indexOf(r.status)<0)o.unshift(r.status);
    html+="<select class=st onchange=\"sv("+r.id+",this.value)\">"+o.map(function(x){return "<option"+(x==r.status?" selected":"")+">"+esc(x)+"</option>"}).join("")+"</select>";
    html+="</div>";
  });
  document.getElementById("list").innerHTML=html||"<div class=load>Nothing here.</div>";
}
async function sv(id,val){var e=await sb.from("tracker_outreach").update({status:val}).eq("id",id);if(e.error){toast("Error");return}for(var i=0;i<OUT.length;i++)if(OUT[i].id==id)OUT[i].status=val;toast("Saved")}
function ct(t){navigator.clipboard.writeText(t).then(function(){toast("Copied")},function(){toast("Copy failed")})}
function cpv(id){var r=rowById(id);if(r)ct((r.contact_value||r.contact||"").replace(/\s*\|\s*/g,"  |  "))}
function cp(id,btn){var r=rowById(id);if(!r)return;var box=document.getElementById("p"+id);if(box)box.classList.toggle("on");
  if(!isNote(r.outreach_copy))navigator.clipboard.writeText(r.outreach_copy).then(function(){toast("Pitch copied")},function(){toast("Copy failed")});}
load();
</script></body></html>
