<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TFS - BookFunnel</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222634;--line:#2c3142;--txt:#e8eaf0;--dim:#9aa0b4;--accent:#c9a94a;--green:#3fb27f;--blue:#4a90d9;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.4}
.wrap{max-width:640px;margin:0 auto;padding:0 12px 80px}
header{position:sticky;top:0;z-index:20;background:#0f1117ee;backdrop-filter:blur(6px);padding:10px 0 6px;border-bottom:1px solid var(--line)}
.back{color:var(--dim);font-size:13px;text-decoration:none}
h1{font-size:17px;margin:6px 0 8px}h1 span{color:var(--green)}
.tools{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
input.search{flex:1;min-width:140px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:14px}
.chip{padding:6px 10px;border-radius:16px;border:1px solid var(--line);background:var(--card);color:var(--dim);font-size:12px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--card2);color:var(--txt);border-color:var(--accent)}
.count{color:var(--dim);font-size:12px;margin:2px 0 8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.card.joined{border-color:var(--green)}.card.done{opacity:.55}
.row1{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.nm{font-weight:600;font-size:15px}.meta{color:var(--dim);font-size:12.5px;margin-top:3px}
.pill{font-size:10.5px;padding:2px 7px;border-radius:10px;background:var(--card2);color:var(--dim);white-space:nowrap}
.pill.strong{color:var(--accent)}.pill.q{color:var(--blue)}
.sub{margin-top:6px;font-size:12.5px;color:var(--accent)}
.acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.btn{flex:1;min-width:92px;text-align:center;padding:9px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
.btn.go{background:var(--accent);color:#141414;border-color:var(--accent)}
select.st{width:100%;margin-top:8px;padding:8px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:13px}
.load{text-align:center;color:var(--dim);padding:40px}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#08130d;padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.2s;z-index:50}
.toast.on{opacity:1}
</style></head>
<body><div class="wrap">
<header>
<a class="back" href="./">&larr; Command Center</a>
<h1><span>BookFunnel</span> Promo Tracker</h1>
<div class="tools" id="tools"></div>
<div class="count" id="count"></div>
</header>
<div id="list"><div class="load">Loading...</div></div>
</div>
<div class="toast" id="toast">Saved</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb=supabase.createClient("https://gewufsselhrzbzrctruo.supabase.co","sb_publishable_Vo58uM-Z-4cKOrAw6pno0g_pMrMuqp6");
var BF=[],q="",f="active",statuses=["To Do","Joined","Shared","Skip","Queued"];
function esc(s){s=s==null?"":""+s;return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function toast(m){var t=document.getElementById("toast");t.textContent=m||"Saved";t.classList.add("on");setTimeout(function(){t.classList.remove("on")},1400)}
async function load(){var a=await sb.from("tracker_bookfunnel").select("*").order("sort_order");if(a.error){document.getElementById("list").innerHTML="<div class=load>"+esc(a.error.message)+"</div>";return}BF=a.data||[];render()}
function render(){
  var h="<input class=search id=q placeholder=Search... value=\""+esc(q)+"\">";
  [["active","Active"],["queued","Queued"],["all","All"]].forEach(function(c){h+="<div class='chip"+(f==c[0]?" on":"")+"' onclick=\"setF('"+c[0]+"')\">"+c[1]+"</div>"});
  document.getElementById("tools").innerHTML=h;
  document.getElementById("q").addEventListener("input",function(e){q=e.target.value;list()});
  list();
}
function setF(v){f=v;render()}
function match(r){if(!q)return true;return JSON.stringify(r).toLowerCase().indexOf(q.toLowerCase())>=0}
function list(){
  var rows=BF.filter(function(r){if(f=="active")return !r.queued;if(f=="queued")return r.queued;return true}).filter(match);
  document.getElementById("count").textContent=rows.length+" promos";
  var html="";
  rows.forEach(function(r){
    var cls="card"+(r.status=="Joined"?" joined":"")+(r.status=="Skip"?" done":"");
    var pill=r.queued?"<span class='pill q'>Queued</span>":"<span class='pill "+(r.tier=="Strong"?"strong":"")+"'>"+esc(r.tier||"")+"</span>";
    html+="<div class='"+cls+"'><div class=row1><div><div class=nm>"+esc(r.name)+"</div><div class=meta>"+(r.host?esc(r.host)+" &middot; ":"")+esc(r.runs||"")+"</div></div>"+pill+"</div>";
    html+="<div class=meta>Submit by: "+esc(r.submit_by||"")+"</div>";
    if(r.share_date)html+="<div class=sub>Share "+esc(r.share_date)+"</div>";
    html+="<div class=acts>";
    if(r.join_url)html+="<a class='btn go' target=_blank href='"+esc(r.join_url)+"'>Open / Join</a>";
    if(r.note)html+="<button class=btn onclick=\"cn("+r.id+")\">Copy note</button>";
    html+="</div>";
    html+="<select class=st onchange=\"sv("+r.id+",this.value)\">"+statuses.map(function(o){return "<option"+(o==r.status?" selected":"")+">"+esc(o)+"</option>"}).join("")+"</select></div>";
  });
  document.getElementById("list").innerHTML=html||"<div class=load>Nothing here.</div>";
}
async function sv(id,val){var e=await sb.from("tracker_bookfunnel").update({status:val}).eq("id",id);if(e.error){toast("Error");return}for(var i=0;i<BF.length;i++)if(BF[i].id==id)BF[i].status=val;toast("Saved")}
function cn(id){var r=BF.filter(function(x){return x.id==id})[0];if(r&&r.note)navigator.clipboard.writeText(r.note).then(function(){toast("Note copied")},function(){toast("Copy failed")})}
load();
</script></body></html>
